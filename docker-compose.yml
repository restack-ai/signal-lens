services:
  db:
    image: pgvector/pgvector:pg16
    container_name: signallens-db
    environment:
      POSTGRES_DB: signallens
      POSTGRES_USER: signallens
      POSTGRES_PASSWORD: signallens
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signallens -d signallens"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: signallens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: signallens-api
    environment:
      DATABASE_URL: postgresql+psycopg://signallens:signallens@db:5432/signallens
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_EXTRACTION_MODEL: ${ANTHROPIC_EXTRACTION_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_SUMMARY_MODEL: ${ANTHROPIC_SUMMARY_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      REAL_INGESTION_MODE: ${REAL_INGESTION_MODE:-true}
      SEED_ON_START: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    mem_limit: 512m
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    container_name: signallens-worker
    environment:
      DATABASE_URL: postgresql+psycopg://signallens:signallens@db:5432/signallens
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_EXTRACTION_MODEL: ${ANTHROPIC_EXTRACTION_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_SUMMARY_MODEL: ${ANTHROPIC_SUMMARY_MODEL:-claude-haiku-4-5-20251001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@$$HOSTNAME --timeout=5 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: celery -A app.worker.celery_app worker -l info --beat
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: signallens-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      NEXT_PUBLIC_REAL_INGESTION_MODE: ${REAL_INGESTION_MODE:-true}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
