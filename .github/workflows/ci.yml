name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: signallens_test
          POSTGRES_USER: signallens
          POSTGRES_PASSWORD: signallens
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U signallens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - run: cd backend && alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://signallens:signallens@localhost:5432/signallens_test
      - run: cd backend && pytest tests/ -v
        env:
          DATABASE_URL: postgresql+psycopg://signallens:signallens@localhost:5432/signallens_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run build
